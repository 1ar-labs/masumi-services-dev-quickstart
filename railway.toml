[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile.registry"

[deploy]
startCommand = "/start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

[[services]]
name = "postgres-registry"
image = "postgres:15"
volumes = { "/var/lib/postgresql/data" = "postgres_registry_data" }

[services.variables]
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = { generate = "password" }
POSTGRES_DB = "registry"

[[services]]
name = "masumi-registry" 
source = "."
builder = "dockerfile"
dockerfilePath = "./Dockerfile.registry"

[services.variables]
DATABASE_URL = { fromService = "postgres-registry", property = "DATABASE_PRIVATE_URL" }
ADMIN_KEY = { generate = "secret" }
BLOCKFROST_API_KEY_PREPROD = { prompt = "Enter your Blockfrost Preprod API key" }
SEED_ONLY_IF_EMPTY = "TRUE"
PORT = "3000"

[services.healthcheck]
path = "/api/v1/health"
interval = 30
timeout = 10
retries = 3

[services.deploy]
numReplicas = 1
startCommand = "/start.sh"